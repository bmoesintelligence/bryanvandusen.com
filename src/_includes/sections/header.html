<header id="cs-navigation">
    <div class="cs-container">
        <!--Nav Logo-->
        <p class="cs-logo">
            Bryan Van Dusen <span class="cs-logo-subtitle"> Author</span>
            <!--<img src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons%2Flogo-black.svg" alt="" width="210" height="29" aria-hidden="true" decoding="async">-->
        </p>
        <!--Navigation List-->
        <nav class="cs-nav" aria-label="main navigation">
            <!--Mobile Nav Toggle-->
            <button class="cs-toggle" id="mobile-menu-toggle" aria-expanded="false" aria-controls="cs-ul-wrapper" aria-label="mobile menu toggle" aria-haspopup="menu">
                <span class="cs-box" aria-hidden="true">
                    <span class="cs-line cs-line1"></span>
                    <span class="cs-line cs-line2"></span>
                    <span class="cs-line cs-line3"></span>
                </span>
            </button>
            <!-- We need a wrapper div so we can set a fixed height on the cs-ul in case the nav list gets too long from too many dropdowns being opened and needs to have an overflow scroll. This wrapper acts as the background so it can go the full height of the screen and not cut off any overflowing nav items while the cs-ul stops short of the bottom of the screen, which keeps all nav items in view no matter how mnay there are-->
            <div class="cs-ul-wrapper" id="cs-ul-wrapper">
                <ul class="cs-ul">
                    <!-- data-label = the handwritten (Caveat) twin that cross-fades in on
                         hover. See .cs-li-link:after in root.less. -->
                    <li class="cs-li">
                        <a href="#about" class="cs-li-link" data-label="About">
                            About
                        </a>
                    </li>
                    <li class="cs-li">
                        <a href="#books" class="cs-li-link" data-label="Books">
                            Books
                        </a>
                    </li>
                    <li class="cs-li">
                        <a href="#contact" class="cs-li-link" data-label="Contact">
                            Contact
                        </a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>
</header>
